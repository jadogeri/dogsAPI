name: Python Package using Pip

on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install the tools needed for testing
        pip install flake8 pytest httpx fastapi pydantic uvicorn
        # Install the project itself (now that pyproject.toml is in the root)
        pip install -e .

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Test with pytest
      run: |
        # Pytest will automatically read the config from pyproject.toml
        pytest
