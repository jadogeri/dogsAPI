name: Python Package using Pip

on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Added httpx, fastapi, and pydantic to ensure the test environment is complete
        pip install flake8 pytest httpx fastapi pydantic
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Install the local package if pyproject.toml exists
        if [ -f pyproject.toml ]; then pip install .; fi

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Test with pytest
      run: |
        # FIX: 'python -m pytest' adds the root directory to sys.path automatically.
        # This allows app/test_dogs.py to find main.py in the root.
        python -m pytest app/test_dogs.py
